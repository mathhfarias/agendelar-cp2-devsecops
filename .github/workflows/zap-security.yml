name: CP2 DevSecOps com OWASP ZAP

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  zap_scan:
    name: Security Scan with OWASP ZAP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Criar pasta de relatórios
        run: mkdir -p zap-reports

      - name: Iniciar aplicação local
        run: |
          nohup npm start > app.log 2>&1 &
          sleep 5

      - name: Validar se aplicação está online
        run: |
          echo "Aguardando aplicação responder em http://127.0.0.1:8080"

          for i in {1..30}; do
            if curl -s http://127.0.0.1:8080 > /dev/null; then
              echo "Aplicação online."
              exit 0
            fi

            echo "Tentativa $i: aplicação ainda não respondeu..."
            sleep 2
          done

          echo "A aplicação não respondeu dentro do tempo esperado."
          cat app.log || true
          exit 1

            - name: Executar OWASP ZAP Baseline Scan
            run: |
          docker run --rm --network host \
            -v "${{ github.workspace }}/zap-reports:/zap/wrk/:rw" \
            -t zaproxy/zap-stable \
            zap-baseline.py \
            -t http://127.0.0.1:8080 \
            -r zap-report.html \
            -J zap-report.json \
            -x zap-report.xml \
            -I || true

      - name: Listar arquivos gerados pelo ZAP
        if: always()
        run: |
          echo "Arquivos dentro de zap-reports:"
          ls -la zap-reports || true

      - name: Copiar log da aplicação para evidência
        if: always()
        run: |
          cp app.log zap-reports/app.log || true
          touch zap-reports/.keep

      - name: Validar se o relatório JSON foi gerado
        run: |
          if [ ! -f "zap-reports/zap-report.json" ]; then
            echo "Relatório JSON do ZAP não foi encontrado."
            echo "Verifique o step de execução do OWASP ZAP."
            exit 1
          fi

          echo "Relatório JSON encontrado com sucesso."

      - name: Analisar relatório do OWASP ZAP
        run: node scripts/analyze-zap.js zap-reports/zap-report.json

      - name: Salvar relatório como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-security-report
          path: zap-reports/

      - name: Falhar pipeline se houver vulnerabilidade Alta ou Crítica
        run: |
          if [ "${ZAP_HIGH:-0}" -gt 0 ] || [ "${ZAP_CRITICAL:-0}" -gt 0 ]; then
            echo "Pipeline bloqueado: vulnerabilidades Altas ou Críticas foram encontradas."
            echo "Vulnerabilidades Altas: ${ZAP_HIGH:-0}"
            echo "Vulnerabilidades Críticas: ${ZAP_CRITICAL:-0}"
            exit 1
          else
            echo "Nenhuma vulnerabilidade Alta ou Crítica encontrada."
          fi